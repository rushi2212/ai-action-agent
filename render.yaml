services:
  - type: web
    name: ai-action-agent-backend
    runtime: python
    pythonVersion: 3.12.8
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python start.py
    envVars:
      - key: PORT
        value: 8000
      - key: GROQ_API_KEY
        sync: false
